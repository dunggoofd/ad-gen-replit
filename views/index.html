<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Static Ads Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex">

  <!-- Sidebar -->
  <aside class="w-56 bg-white border-r border-gray-200 flex flex-col h-screen sticky top-0">
    <div class="flex items-center justify-between px-4 py-3 border-b border-gray-200">
      <span class="text-sm font-semibold text-gray-700 uppercase tracking-wide">Workspaces</span>
      <button id="btn-add-client" class="w-6 h-6 rounded text-gray-500 hover:bg-indigo-50 hover:text-indigo-600 flex items-center justify-center text-xl leading-none font-light">+</button>
    </div>
    <ul id="client-list" class="flex-1 overflow-y-auto py-2"></ul>
  </aside>

  <!-- Main -->
  <main class="flex-1 p-6 overflow-y-auto">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Brand Setup</h1>

    <!-- Tab buttons -->
    <div class="border-b border-gray-200 mb-6">
      <nav class="flex gap-0" aria-label="Tabs">
        <button class="tab-btn border-b-2 border-indigo-500 text-indigo-600 px-4 py-2 text-sm font-medium" data-tab="brand-kit">Brand Kit</button>
        <button class="tab-btn border-b-2 border-transparent text-gray-500 hover:text-gray-700 px-4 py-2 text-sm font-medium" data-tab="brand-assets">Brand Assets</button>
      </nav>
    </div>

    <div class="flex gap-6">
      <!-- Tab panels -->
      <div class="flex-1">

        <!-- Brand Kit tab -->
        <div id="tab-brand-kit" class="tab-panel">
          <div class="bg-white rounded-lg border border-gray-200 p-6 space-y-4">
            <div class="grid grid-cols-3 gap-4">
              <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Primary Color</label>
                <input type="color" id="field-primary-color" class="brand-field h-10 w-full rounded border border-gray-300 cursor-pointer" value="#3b82f6">
              </div>
              <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Secondary Color</label>
                <input type="color" id="field-secondary-color" class="brand-field h-10 w-full rounded border border-gray-300 cursor-pointer" value="#6b7280">
              </div>
              <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Accent Color</label>
                <input type="color" id="field-accent-color" class="brand-field h-10 w-full rounded border border-gray-300 cursor-pointer" value="#f59e0b">
              </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Heading Font</label>
                <input type="text" id="field-font-heading" class="brand-field w-full rounded border border-gray-300 px-3 py-2 text-sm" placeholder="Heading font">
              </div>
              <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Body Font</label>
                <input type="text" id="field-font-body" class="brand-field w-full rounded border border-gray-300 px-3 py-2 text-sm" placeholder="Body font">
              </div>
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">Tone of Voice</label>
              <textarea id="field-tone" class="brand-field w-full rounded border border-gray-300 px-3 py-2 text-sm" rows="2" placeholder="Friendly, bold..."></textarea>
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">Tagline</label>
              <input type="text" id="field-tagline" class="brand-field w-full rounded border border-gray-300 px-3 py-2 text-sm" placeholder="Your brand tagline">
            </div>
            <div class="pt-1">
              <span id="save-status" class="text-sm text-gray-500">Saved</span>
            </div>
          </div>
        </div>

        <!-- Brand Assets tab -->
        <div id="tab-brand-assets" class="tab-panel hidden">
          <div class="bg-white rounded-lg border border-gray-200 p-6 space-y-6">

            <!-- Light Logo -->
            <div class="space-y-2">
              <p class="text-sm font-medium text-gray-700">Light Logo</p>
              <img id="preview-logo-light" class="h-16 object-contain hidden border border-gray-200 rounded p-1 bg-gray-800">
              <input type="file" id="input-logo-light" accept="image/*" class="block text-sm text-gray-600">
              <button data-field="logo_light" class="btn-logo-delete hidden text-xs text-red-500 hover:text-red-700">Remove</button>
            </div>

            <!-- Dark Logo -->
            <div class="space-y-2">
              <p class="text-sm font-medium text-gray-700">Dark Logo</p>
              <img id="preview-logo-dark" class="h-16 object-contain hidden border border-gray-200 rounded p-1">
              <input type="file" id="input-logo-dark" accept="image/*" class="block text-sm text-gray-600">
              <button data-field="logo_dark" class="btn-logo-delete hidden text-xs text-red-500 hover:text-red-700">Remove</button>
            </div>

            <!-- Icon Logo -->
            <div class="space-y-2">
              <p class="text-sm font-medium text-gray-700">Icon Logo</p>
              <img id="preview-logo-icon" class="h-16 object-contain hidden border border-gray-200 rounded p-1">
              <input type="file" id="input-logo-icon" accept="image/*" class="block text-sm text-gray-600">
              <button data-field="logo_icon" class="btn-logo-delete hidden text-xs text-red-500 hover:text-red-700">Remove</button>
            </div>

          </div>
        </div>

      </div>

      <!-- Live preview card -->
      <div id="preview-card" class="w-64 flex-shrink-0">
        <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
          <p class="text-xs font-medium text-gray-500 px-3 pt-3 pb-1 uppercase tracking-wide">Preview</p>
          <div id="preview-bg" class="h-24 rounded-t" style="background-color: #3b82f6;"></div>
          <div class="p-3">
            <div id="preview-tagline" class="text-sm font-bold text-gray-800 mb-2">Your tagline here</div>
            <div id="preview-colors" class="flex gap-1">
              <div class="preview-swatch w-6 h-6 rounded-full border border-gray-200" style="background-color: #3b82f6;"></div>
              <div class="preview-swatch w-6 h-6 rounded-full border border-gray-200" style="background-color: #6b7280;"></div>
              <div class="preview-swatch w-6 h-6 rounded-full border border-gray-200" style="background-color: #f59e0b;"></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <script>
    let activeClientId = null;

    function clientHeaders() {
      return { 'X-Client-Id': String(activeClientId) };
    }

    function getCookie(name) {
      const match = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
      return match ? decodeURIComponent(match[1]) : null;
    }

    function renderClientList(clients) {
      const ul = document.getElementById('client-list');
      ul.innerHTML = '';
      clients.forEach(c => {
        const li = document.createElement('li');
        li.dataset.id = c.id;
        li.textContent = c.name;
        li.className = 'px-4 py-2 text-sm cursor-pointer rounded mx-1 ' +
          (String(c.id) === String(activeClientId)
            ? 'bg-indigo-50 text-indigo-700 font-semibold'
            : 'text-gray-700 hover:bg-gray-50');
        li.addEventListener('click', () => {
          activeClientId = c.id;
          document.querySelectorAll('#client-list li').forEach(el => {
            el.className = 'px-4 py-2 text-sm cursor-pointer rounded mx-1 text-gray-700 hover:bg-gray-50';
          });
          li.className = 'px-4 py-2 text-sm cursor-pointer rounded mx-1 bg-indigo-50 text-indigo-700 font-semibold';
          loadBrandKit();
        });
        ul.appendChild(li);
      });
    }

    async function loadClients() {
      const res = await fetch('/api/clients');
      const clients = await res.json();
      const cookieId = getCookie('active_client_id');
      if (cookieId && clients.some(c => String(c.id) === cookieId)) {
        activeClientId = cookieId;
      } else if (clients.length > 0) {
        activeClientId = clients[0].id;
      }
      renderClientList(clients);
      if (activeClientId) loadBrandKit();
    }

    document.getElementById('btn-add-client').addEventListener('click', async () => {
      const name = window.prompt('Workspace name:');
      if (!name || !name.trim()) return;
      const res = await fetch('/api/clients', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name.trim() }),
      });
      const client = await res.json();
      activeClientId = client.id;
      document.cookie = `active_client_id=${client.id}; path=/`;
      const listRes = await fetch('/api/clients');
      const clients = await listRes.json();
      renderClientList(clients);
      loadBrandKit();
    });

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
        document.getElementById(`tab-${btn.dataset.tab}`).classList.remove('hidden');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('border-indigo-500', 'text-indigo-600'));
        btn.classList.add('border-indigo-500', 'text-indigo-600');
      });
    });

    // Brand Kit JS
    function collectBrandKitFields() {
      return {
        primaryColor: document.getElementById('field-primary-color').value,
        secondaryColor: document.getElementById('field-secondary-color').value,
        accentColor: document.getElementById('field-accent-color').value,
        fonts: {
          heading: document.getElementById('field-font-heading').value,
          body: document.getElementById('field-font-body').value,
        },
        toneOfVoice: document.getElementById('field-tone').value,
        tagline: document.getElementById('field-tagline').value,
      };
    }

    function populateBrandKitFields(kit) {
      if (!kit) return;
      document.getElementById('field-primary-color').value = kit.primary_color || '#3b82f6';
      document.getElementById('field-secondary-color').value = kit.secondary_color || '#6b7280';
      document.getElementById('field-accent-color').value = kit.accent_color || '#f59e0b';
      const fonts = kit.fonts || {};
      document.getElementById('field-font-heading').value = fonts.heading || '';
      document.getElementById('field-font-body').value = fonts.body || '';
      document.getElementById('field-tone').value = kit.tone_of_voice || '';
      document.getElementById('field-tagline').value = kit.tagline || '';
      for (const field of ['logo_light', 'logo_dark', 'logo_icon']) {
        const suffix = field.replace('logo_', '');
        const img = document.getElementById(`preview-logo-${suffix}`);
        const btn = document.querySelector(`[data-field="${field}"]`);
        if (kit[field]) {
          img.src = kit[field]; img.classList.remove('hidden');
          if (btn) btn.classList.remove('hidden');
        } else {
          img.classList.add('hidden');
          if (btn) btn.classList.add('hidden');
        }
      }
      updatePreview();
    }

    function debounce(fn, ms) {
      let t;
      return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
    }

    const saveStatus = document.getElementById('save-status');
    const autosave = debounce(async () => {
      saveStatus.textContent = 'Saving...';
      try {
        const res = await fetch('/api/brand-kit', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', ...clientHeaders() },
          body: JSON.stringify(collectBrandKitFields()),
        });
        if (!res.ok) throw new Error('Save failed');
        saveStatus.textContent = 'Saved';
      } catch {
        saveStatus.textContent = 'Save failed';
      }
    }, 800);

    function updatePreview() {
      document.getElementById('preview-bg').style.backgroundColor =
        document.getElementById('field-primary-color').value;
      document.getElementById('preview-tagline').textContent =
        document.getElementById('field-tagline').value || 'Your tagline here';
      const swatches = document.querySelectorAll('.preview-swatch');
      const colors = ['field-primary-color', 'field-secondary-color', 'field-accent-color'];
      swatches.forEach((sw, i) => { sw.style.backgroundColor = document.getElementById(colors[i]).value; });
    }

    document.querySelectorAll('.brand-field').forEach(el => {
      el.addEventListener('input', () => { updatePreview(); autosave(); });
    });

    async function loadBrandKit() {
      if (!activeClientId) return;
      const res = await fetch('/api/brand-kit', { headers: clientHeaders() });
      const kit = await res.json();
      populateBrandKitFields(kit);
    }

    document.querySelectorAll('input[type="file"][id^="input-logo-"]').forEach(input => {
      input.addEventListener('change', async () => {
        if (!input.files[0]) return;
        const fieldName = input.id.replace('input-logo-', 'logo_');
        const suffix = input.id.replace('input-logo-', '');
        const fd = new FormData();
        fd.append(fieldName, input.files[0]);
        const res = await fetch('/api/brand-kit/logo', {
          method: 'POST',
          headers: clientHeaders(),
          body: fd,
        });
        const kit = await res.json();
        if (kit[fieldName]) {
          const img = document.getElementById(`preview-logo-${suffix}`);
          img.src = kit[fieldName]; img.classList.remove('hidden');
          const btn = document.querySelector(`[data-field="${fieldName}"]`);
          if (btn) btn.classList.remove('hidden');
        }
        input.value = '';
      });
    });

    document.querySelectorAll('.btn-logo-delete').forEach(btn => {
      btn.addEventListener('click', async () => {
        const field = btn.dataset.field;
        await fetch(`/api/brand-kit/logo/${field}`, {
          method: 'DELETE',
          headers: clientHeaders(),
        });
        const suffix = field.replace('logo_', '');
        const img = document.getElementById(`preview-logo-${suffix}`);
        img.classList.add('hidden');
        btn.classList.add('hidden');
      });
    });

    document.addEventListener('DOMContentLoaded', () => {
      loadClients();
    });
  </script>
</body>
</html>
